<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIC Deneme Cevap Anahtarı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        /* Neon Efekti */
        .neon-text {
            color: #ff0000;
            text-shadow: 0 0 3px #ff0000, 0 0 8px rgba(255, 0, 0, 0.4);
            font-weight: 900;
            font-style: italic;
        }

        /* Branş Renkleri */
        .header-turkce { background-color: #f39c12; }
        .header-sosyal { background-color: #00c0ef; }
        .header-matematik { background-color: #e011d0; }
        .header-fen { background-color: #00a65a; }

        /* Cevap Sütunları */
        .answer-column {
            background: #ffffff;
            color: #333;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .column-title {
            text-align: center;
            font-weight: bold;
            padding: 6px 2px;
            color: white;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 2px 6px;
            font-size: 0.7rem;
            border-bottom: 1px solid #f0f0f0;
        }

        @media (min-width: 768px) {
            .column-title { font-size: 0.9rem; padding: 10px; }
            .row { font-size: 0.85rem; padding: 4px 12px; }
        }

        .row:nth-child(even) {
            background-color: #f8f8f8;
        }

        .q-num {
            color: #bbb;
            font-weight: 600;
            width: 20px;
        }

        .q-ans {
            color: #2980b9;
            font-weight: 800;
            text-align: right;
        }

        /* Kontrol Paneli */
        .control-panel {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea, .input-field {
            width: 100%;
            background: #252525;
            border: 1px solid #444;
            color: #00ff00;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            resize: none;
            font-size: 0.8rem;
        }

        .input-field {
            color: white;
            font-family: 'Inter', sans-serif;
            margin-bottom: 10px;
        }

        .generate-btn {
            background: linear-gradient(135deg, #ff0000 0%, #990000 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .active-mode {
            background: #ff0000 !important;
            color: white !important;
        }

        /* Sayfa Geçişleri */
        .page {
            transition: opacity 0.6s ease-in-out;
            opacity: 0;
            display: none;
        }

        .page-active {
            display: block;
            opacity: 1;
        }

        /* Loading Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f0f0f;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #222;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .forced-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        @media (min-width: 768px) {
            .forced-grid { gap: 15px; }
        }

        #capture-area {
            background: #0f0f0f;
            padding: 20px;
            border-radius: 16px;
        }

        /* Branş Düzenleme Alanı */
        #branch-settings {
            display: none;
            border-top: 1px solid #333;
            margin-top: 20px;
            padding-top: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="text-red-600 font-bold tracking-[0.4em] text-xs animate-pulse">Lütfen Bekleyin...</p>
    </div>

    <div class="container py-4">
        
        <div id="page-input" class="page page-active" style="opacity: 1;">
            <div class="control-panel">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-400 tracking-widest uppercase">⚙️ Yapılandırma</h2>
                    <button onclick="toggleBranchSettings()" class="text-[10px] bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-1 rounded border border-gray-700 transition">
                        🔧 Branş İsimleri
                    </button>
                </div>
                
                <!-- Branş İsim Ayarları (Gizli) -->
                <div id="branch-settings" class="mb-6">
                    <p class="text-[10px] font-bold text-gray-500 mb-3 uppercase">Branş İsimleri</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <input type="text" id="name-1" value="TÜRKÇE" class="input-field text-xs" oninput="syncLabels()">
                        <input type="text" id="name-2" value="SOSYAL" class="input-field text-xs" oninput="syncLabels()">
                        <input type="text" id="name-3" value="MATEMATİK" class="input-field text-xs" oninput="syncLabels()">
                        <input type="text" id="name-4" value="FEN" class="input-field text-xs" oninput="syncLabels()">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Deneme Başlığı</label>
                        <input type="text" id="input-title" value="TOPRAK TG202606" class="w-full bg-gray-800 border border-gray-700 p-3 rounded text-white text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Sınav Türü</label>
                        <div class="flex gap-2">
                            <button id="mode-tyt" onclick="setMode('TYT')" class="flex-1 bg-gray-800 p-3 rounded font-bold text-sm transition">TYT</button>
                            <button id="mode-ayt" onclick="setMode('AYT')" class="flex-1 bg-gray-800 p-3 rounded font-bold text-sm active-mode transition">AYT</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Kitapçık</label>
                        <div class="flex gap-1">
                            <button onclick="setBooklet('A')" class="booklet-btn flex-1 bg-gray-800 p-3 rounded font-bold text-sm active-mode" id="btn-A">A</button>
                            <button onclick="setBooklet('B')" class="booklet-btn flex-1 bg-gray-800 p-3 rounded font-bold text-sm" id="btn-B">B</button>
                            <button onclick="setBooklet('C')" class="booklet-btn flex-1 bg-gray-800 p-3 rounded font-bold text-sm" id="btn-C">C</button>
                            <button onclick="setBooklet('D')" class="booklet-btn flex-1 bg-gray-800 p-3 rounded font-bold text-sm" id="btn-D">D</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                    <div>
                        <label id="label-1" class="block text-[10px] font-bold text-orange-500 mb-1 uppercase">TÜRKÇE</label>
                        <textarea id="ans-1" rows="4" placeholder="ABC..."></textarea>
                    </div>
                    <div>
                        <label id="label-2" class="block text-[10px] font-bold text-cyan-500 mb-1 uppercase">SOSYAL</label>
                        <textarea id="ans-2" rows="4" placeholder="ABC..."></textarea>
                    </div>
                    <div>
                        <label id="label-3" class="block text-[10px] font-bold text-purple-500 mb-1 uppercase">MATEMATİK</label>
                        <textarea id="ans-3" rows="4" placeholder="ABC..."></textarea>
                    </div>
                    <div>
                        <label id="label-4" class="block text-[10px] font-bold text-green-500 mb-1 uppercase">FEN</label>
                        <textarea id="ans-4" rows="4" placeholder="ABC..."></textarea>
                    </div>
                </div>

                <div class="text-center">
                    <button class="generate-btn w-full md:w-auto" onclick="startTransition()">Anahtarı Oluştur</button>
                </div>
            </div>
        </div>

        <div id="page-output" class="page">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-2">
                <button onclick="reverseTransition()" class="text-xs bg-gray-900 hover:bg-gray-800 text-white px-5 py-2 rounded-full border border-gray-700 flex items-center gap-2 transition active:scale-95 shadow-xl">
                    <span>←</span> Geri Dön
                </button>
                <button onclick="downloadPNG()" class="text-xs bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-full border border-red-500 flex items-center gap-2 transition active:scale-95 shadow-xl font-bold">
                    <span>📥</span> Resmi İndir (PNG)
                </button>
            </div>

            <div id="capture-area">
                <header class="flex justify-between items-end mb-8 border-b border-gray-800 pb-6">
                    <div class="flex-1">
                        <h1 id="display-title" class="text-lg md:text-3xl font-black text-orange-500 tracking-tighter uppercase leading-none"></h1>
                        <p id="display-booklet" class="text-[10px] md:text-base font-bold text-orange-600 mt-2"></p>
                    </div>
                    <div class="text-right">
                        <span class="neon-text text-2xl md:text-4xl">FIC Deneme</span>
                    </div>
                </header>

                <div class="forced-grid" id="grid-container">
                    <!-- JS dolacak -->
                </div>
                
                <footer class="mt-10 text-center text-[10px] text-gray-600 tracking-widest uppercase pt-6 border-t border-gray-900">
                    FIC DENEME - hizliyim
                </footer>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'AYT';
        let currentBooklet = 'A';

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-tyt').classList.toggle('active-mode', mode === 'TYT');
            document.getElementById('mode-ayt').classList.toggle('active-mode', mode === 'AYT');
        }

        function setBooklet(type) {
            currentBooklet = type;
            document.querySelectorAll('.booklet-btn').forEach(btn => btn.classList.remove('active-mode'));
            document.getElementById('btn-' + type).classList.add('active-mode');
        }

        function toggleBranchSettings() {
            const settings = document.getElementById('branch-settings');
            settings.style.display = settings.style.display === 'block' ? 'none' : 'block';
        }

        function syncLabels() {
            for(let i=1; i<=4; i++) {
                const val = document.getElementById('name-'+i).value || '-';
                document.getElementById('label-'+i).innerText = val;
            }
        }

        function downloadPNG() {
            const captureArea = document.getElementById('capture-area');
            const title = document.getElementById('input-title').value || 'cevap_anahtari';
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "Hazırlanıyor...";

            html2canvas(captureArea, {
                backgroundColor: '#0f0f0f',
                scale: 2,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `${title}_${currentMode}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                btn.innerHTML = originalText;
            });
        }

        function startTransition() {
            const pageInput = document.getElementById('page-input');
            const loader = document.getElementById('loading-overlay');
            const pageOutput = document.getElementById('page-output');

            pageInput.style.opacity = '0';
            setTimeout(() => {
                pageInput.classList.remove('page-active');
                loader.style.display = 'flex';
                setTimeout(() => loader.style.opacity = '1', 50);

                setTimeout(() => {
                    renderAnswers();
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        pageOutput.classList.add('page-active');
                        setTimeout(() => { pageOutput.style.opacity = '1'; }, 50);
                        window.scrollTo(0,0);
                    }, 500);
                }, 1200);
            }, 500);
        }

        function reverseTransition() {
            const pageInput = document.getElementById('page-input');
            const pageOutput = document.getElementById('page-output');
            pageOutput.style.opacity = '0';
            setTimeout(() => {
                pageOutput.classList.remove('page-active');
                pageInput.classList.add('page-active');
                setTimeout(() => pageInput.style.opacity = '1', 50);
                window.scrollTo(0,0);
            }, 500);
        }

        function renderAnswers() {
            const titleInput = document.getElementById('input-title').value;
            const gridContainer = document.getElementById('grid-container');
            
            document.getElementById('display-title').innerText = `${titleInput} ${currentMode}`;
            document.getElementById('display-booklet').innerText = `${currentBooklet} KİTAPÇIĞI`;
            
            gridContainer.innerHTML = '';

            const branchNames = [
                document.getElementById('name-1').value,
                document.getElementById('name-2').value,
                document.getElementById('name-3').value,
                document.getElementById('name-4').value
            ];

            const colors = ['header-turkce', 'header-sosyal', 'header-matematik', 'header-fen'];
            const counts = currentMode === 'TYT' ? [40, 20, 40, 20] : [40, 40, 40, 40];

            for (let b = 0; b < 4; b++) {
                const col = document.createElement('div');
                col.className = 'answer-column';

                const header = document.createElement('div');
                header.className = `column-title ${colors[b]}`;
                header.innerText = branchNames[b] || 'BRANŞ';
                col.appendChild(header);

                const listDiv = document.createElement('div');
                listDiv.className = 'flex flex-col';

                const rawAnswers = document.getElementById('ans-' + (b+1)).value.toUpperCase().replace(/\s/g, '');

                for (let i = 1; i <= counts[b]; i++) {
                    const row = document.createElement('div');
                    row.className = 'row';
                    let char = rawAnswers[i - 1] || "-";
                    if (char === 'X' || char === '') char = "-";
                    row.innerHTML = `<span class="q-num">${i}.</span><span class="q-ans">${char}</span>`;
                    listDiv.appendChild(row);
                }
                col.appendChild(listDiv);
                gridContainer.appendChild(col);
            }
        }
    </script>
</body>
</html>
